# zrouter example configuration
# Anthropic API routing daemon

[server]
bind = "127.0.0.1"
port = 3837
# api_key = "sk-zrouter-your-key-here"  # Set or use ZROUTER_API_KEY env
max_body_size = 10485760  # 10MB

# TLS configuration (uncomment to enable HTTPS)
# tls = true
# cert_file = "/path/to/cert.pem"
# key_file = "/path/to/key.pem"
# If tls = true but cert_file/key_file are not set,
# a self-signed dev certificate is auto-generated and persisted to
# {config_dir}/zrouter-dev-cert.pem (reuse across restarts).
# Import the PEM file into your trust store for AI tool access.

[logging]
level = "info"
format = "text"  # "json" or "text"

# --- Provider definitions ---
# Each provider is an Anthropic-compatible endpoint
# provider_type: "anthropic" (default), "deepseek", "zhipu", "kimi", "openai"

[providers.anthropic]
endpoint = "https://api.anthropic.com"
# api_key_env = "ANTHROPIC_API_KEY"   # Use env var in production
api_key = "sk-ant-dev-placeholder"    # Replace with real key or use api_key_env
connect_timeout_secs = 10
read_timeout_secs = 300
# provider_type = "anthropic"

[providers.openrouter]
endpoint = "https://openrouter.ai/api"
# api_key_env = "OPENROUTER_API_KEY"
api_key = "sk-or-dev-placeholder"
connect_timeout_secs = 10
read_timeout_secs = 300

[providers.closeai]
endpoint = "https://api.openai-proxy.org/anthropic"
# api_key_env = "CLOSEAI_API_KEY"
api_key = "sk-closeai-dev-placeholder"
connect_timeout_secs = 10
read_timeout_secs = 300

# --- Routing rules ---
# model: exact match, prefix wildcard ("claude-opus-*"), or "default"
# Priority: exact > prefix > default

[[route]]
model = "claude-opus-*"
# debug = "v"   # "none" (default), "v" (summary), "vv" (detailed)
steps = [
  { provider = "anthropic" },
  { provider = "openrouter" },
]

[[route]]
model = "claude-sonnet-*"
steps = [
  { provider = "anthropic" },
  { provider = "closeai" },
]

[[route]]
model = "claude-haiku-*"
steps = [
  { provider = "closeai" },
  { provider = "anthropic" },
]

[[route]]
model = "default"
steps = [
  { provider = "anthropic" },
  { provider = "closeai" },
]

# --- Error codes configuration ---
# Path to error code rules file. Without this, all non-2xx responses are Fatal.
# Uncomment the line below to enable provider-aware error classification.
# Path is relative to this config file's directory.
# error_codes_file = "error-codes.toml"

# --- Fallback policy ---

[fallback]
step_max_retries = 2           # max retries per step (2 = 3 attempts total)
initial_delay_ms = 500         # initial retry delay
max_delay_ms = 8000            # max retry delay cap
non_retryable_cooldown_secs = 3600  # cooldown for non-retryable failures
